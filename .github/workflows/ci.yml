name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  millennium:
    name: Millennium / Windows port
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and pinned submodules
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Lua syntax checker
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Validate, test, build, and package
        run: pnpm run check:millennium

      - name: Upload verified release archive
        uses: actions/upload-artifact@v4
        with:
          name: deck-shelves-millennium-${{ github.sha }}
          path: "Deck Shelves v*.zip"
