name: Bug report
description: Report a problem with Deck Shelves Millennium on Windows
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please check existing issues first. Do not include Steam credentials, tokens, or private data in logs.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Steam Big Picture
        2. Navigate to ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Deck Shelves version
      placeholder: "3.1.0"
    validations:
      required: true

  - type: input
    id: millennium_version
    attributes:
      label: Millennium version
      placeholder: "3.x.x"
    validations:
      required: true

  - type: input
    id: windows_version
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: true

  - type: input
    id: steam_version
    attributes:
      label: Steam client version or build date
    validations:
      required: true

  - type: dropdown
    id: input_method
    attributes:
      label: Input method
      options:
        - Controller
        - Keyboard
        - Mouse
        - Multiple input methods
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Logs, screenshots, or recordings
      description: Add any non-sensitive diagnostic information that helps reproduce the issue.
